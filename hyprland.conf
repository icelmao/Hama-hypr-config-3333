$hypr = ~/.config/hypr
$hl = $hypr/hyprland




$cConf = ~/.config/caelestia
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,hyprland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# Forces the latest NVIDIA sync protocol
env = NVD_BACKEND,direct
# Helps with XWayland frame pacing
env = __GL_MAX_FRAMES_ALLOWED,1


# Variables (colours + other vars)
exec = cp -L --no-preserve=mode --update=none $hypr/scheme/default.conf $hypr/scheme/current.conf
source = $hypr/scheme/current.conf
source = $hypr/variables.conf

# User variables
exec = mkdir -p $cConf && touch -a $cConf/hypr-vars.conf
source = $cConf/hypr-vars.conf

# Default monitor config
monitor = , preferred, auto, 1

# Explicitly set 1080p at 120Hz for your Lenovo panel
monitor = eDP-1, 1920x1080@120, 0x0, 1




# Configs
source = $hl/env.conf
source = $hl/general.conf
source = $hl/input.conf
source = $hl/misc.conf
source = $hl/animations.conf
source = $hl/decoration.conf
source = $hl/group.conf
source = $hl/execs.conf
source = $hl/rules.conf
source = $hl/gestures.conf
source = $hl/keybinds.conf


# 1. Start the overview service on login
exec-once = qs -c overview

# 2. The toggle keybind (Replace Super+TAB if you prefer another key)
bind = Super, TAB, exec, qs ipc -c overview call overview toggle



# User configs

exec = mkdir -p $cConf && touch -a $cConf/hypr-user.conf
source = $cConf/hypr-user.conf
exec-once = systemctl --user start hyprpolkitagent



# Select area and edit with swappy
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -

# (Optional) Screenshot current display and edit with swappy
bind = SHIFT, Print, exec, grim - | swappy -f -



# Clipboard History (added by win11-clipboard-history)
# bind = SUPER, V, exec, win11-clipboard-history # Commented by win11-clipboard-history

# Clipboard History (added by win11-clipboard-history)
bind = SUPER, period, exec, win11-clipboard-history --emoji


env = QS_DISABLE_DMABUF,1
